# Nginx config for the Orchestrator panel itself.
# Replace PANEL_DOMAIN with your actual domain (e.g. deploy.example.com).
# Place this file in /etc/nginx/sites-available/orchestrator and symlink to sites-enabled.
#
# After SSL is issued via certbot --nginx -d PANEL_DOMAIN, certbot will
# append the HTTPS server block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name PANEL_DOMAIN;

    # Serve the built React SPA
    root /opt/orchestrator/apps/web/dist;
    index index.html;

    # All non-file routes fall through to index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* to the Node.js backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (Server-Sent Events) — deploy/provision log streams
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_set_header   Connection '';
    }
}
