# Nginx config for the Orchestrator panel itself.
# Replace PANEL_DOMAIN with your actual domain (e.g. deploy.example.com).
# Place this file in /etc/nginx/sites-available/orchestrator and symlink to sites-enabled.
#
# After SSL is issued via certbot --nginx -d PANEL_DOMAIN, certbot will
# append the HTTPS server block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name PANEL_DOMAIN;

    # Serve the built React SPA
    root /opt/orchestrator/apps/web/dist;
    index index.html;

    # index.html must NEVER be cached (by the browser or Cloudflare) — it
    # references hashed JS/CSS filenames from the *current* build. If it gets
    # cached, users keep loading an old index.html that points at JS/CSS
    # chunks a later build has already deleted, producing a stale/mixed UI
    # until a hard refresh busts the cached HTML.
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Hashed build assets are immutable — safe to cache aggressively/forever.
    location ~* \.(?:js|css|svg|woff2?|ttf|eot|png|jpe?g|gif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # All other non-file routes fall through to index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket upgrade for the web terminal. This is a longer, more specific
    # prefix than the general /api/ block below, so nginx matches it first
    # regardless of declaration order; ^~ also skips any regex location checks.
    location ^~ /api/terminal/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Proxy all other /api/* to the Node.js backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (Server-Sent Events) — deploy/provision log streams
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_set_header   Connection '';

        # Allow large DB dump uploads (sql / sql.gz). nginx default is 1 MB
        # which produces a 413 for any real-world database export.
        client_max_body_size 512m;
    }
}
